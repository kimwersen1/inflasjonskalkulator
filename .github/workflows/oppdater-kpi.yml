name: Oppdater KPI-tall fra SSB

on:
  schedule:
    - cron: '0 9 10 * *'   # Den 10. hver måned kl. 09:00 UTC (11:00 norsk tid)
    - cron: '0 8 1 * *'    # Den 1. hver måned kl. 08:00 UTC – holder repoen aktiv
  workflow_dispatch:

jobs:
  oppdater-kpi:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Hent kode
        uses: actions/checkout@v4.2.2

      - name: Sett opp Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Installer avhengigheter
        run: pip install requests

      - name: Hent KPI-tall fra SSB og oppdater index.html
        run: python3 .github/scripts/oppdater_kpi.py

      - name: Commit og push endringer
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html sitemap.xml kpi-rapport/ artikler/ husleiekalkulator.html lønnskalkulator.html og-*.svg
          git diff --staged --quiet || git commit -m "Automatisk oppdatering av KPI-tall fra SSB $(date +'%Y-%m-%d')"
          git push
