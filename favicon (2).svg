<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark green background circle -->
  <rect width="32" height="32" rx="6" fill="#114d2e"/>
  <!-- % symbol for inflation -->
  <text x="5" y="14" font-family="Arial" font-weight="bold" font-size="11" fill="#6ee09e">%</text>
  <!-- Calculator grid dots -->
  <rect x="5" y="18" width="4" height="3" rx="1" fill="#6ee09e"/>
  <rect x="10" y="18" width="4" height="3" rx="1" fill="#6ee09e"/>
  <rect x="15" y="18" width="4" height="3" rx="1" fill="#ffffff"/>
  <rect x="20" y="18" width="7" height="3" rx="1" fill="#2a9d60"/>
  <rect x="5" y="23" width="4" height="3" rx="1" fill="#6ee09e"/>
  <rect x="10" y="23" width="4" height="3" rx="1" fill="#6ee09e"/>
  <rect x="15" y="23" width="4" height="3" rx="1" fill="#6ee09e"/>
  <rect x="20" y="23" width="7" height="3" rx="1" fill="#6ee09e"/>
  <!-- Up arrow for inflation -->
  <text x="16" y="13" font-family="Arial" font-weight="bold" font-size="10" fill="#ffffff">↑</text>
</svg>